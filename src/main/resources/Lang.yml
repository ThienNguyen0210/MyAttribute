# --- Chung ---
no-permission: "&cBạn không có quyền dùng lệnh này!"
console-only-text: "&cConsole không mở được GUI! Dùng: /attr stats <player> <stats> <value> <second>"
player-not-found: "&cKhông tìm thấy người chơi &e{player} &ctrên server!"

# --- /attr stats ---
stats-usage: "&eUsage: /attr stats <player> <stats> <value> <second>"
stats-invalid-value: "&c<value> phải là số! Ví dụ: 10 hoặc 10% hoặc 10.5"
